model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
[plugins."github@openai-curated"]
enabled = false

[projects."/"]
trust_level = "trusted"

[projects."/home/heocop/Projects/codex_agents"]
trust_level = "trusted"





# BEGIN CODEX_AGENTS_MANAGED
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
personality = "pragmatic"
approval_policy = "on-request"

[features]
memories = true
plugins = false

[memories]
no_memories_if_mcp_or_web_search = true

[profiles.fast]
model = "gpt-5.4-nano"
model_reasoning_effort = "low"
approval_policy = "on-request"

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
approval_policy = "on-request"

[profiles.review]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
approval_policy = "never"

[profiles.batch]
model = "gpt-5.4-nano"
model_reasoning_effort = "low"
approval_policy = "never"

[profiles.self-heal]
model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "on-request"

[profiles.read-only]
model = "gpt-5.4-nano"
model_reasoning_effort = "low"
approval_policy = "never"

[agents]
max_threads = 2
max_depth = 2

[caching]
provider = "enabled"
strategy = "strategic-prefix"
plan_caching = true
prefix_file = "codex-home/system_prefix.md"

[caching.semantic]
enable = true
similarity_threshold = 0.92
collection = "semantic_cache"
ttl_seconds = 3600

[mcp_servers.codex_knowledge]
command = "uv"
args = [
  "run",
  "--project",
  "/home/heocop/Projects/codex_agents/runtime/codex_knowledge",
  "python",
  "-m",
  "codex_knowledge.server",
]

[mcp_servers.planner]
command = "uv"
args = [
  "run",
  "--project",
  "/home/heocop/Projects/codex_agents/mcp/planner",
  "python",
  "-m",
  "planner.server",
]

[mcp_servers.codegraph]
command = "uv"
args = [
  "run",
